<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gestion des BT — AI Boucle de Seine Nord</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar__left">
      <div class="brand">
        <div class="brand__title">Gestion des BT</div>
        <div class="brand__sub">AI Boucle de Seine Nord</div>
      </div>
    </div>

    <div class="topbar__center">
      <div class="clockline">
        <div id="nowDate" class="nowDate">—</div>
        <div id="nowTime" class="nowTime">—</div>
      </div>
    </div>

    <div class="topbar__right">
      <label class="btn btn--secondary">
        Importer PDF
        <input id="pdfFile" type="file" accept="application/pdf" hidden />
      </label>

      <button id="btnExtract" class="btn">Extraire</button>

      <div class="seg">
        <button class="seg__btn seg__btn--active" data-view="referent">Référent</button>
        <button class="seg__btn" data-view="brief">Brief</button>
      </div>

      <button id="btnFullscreen" class="btn btn--secondary" title="Plein écran">Plein écran</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar card">
      <div class="card__title">Contrôle</div>

      <div class="field">
        <div class="label">Zones</div>
        <div id="zonesStatus" class="hint">Chargement…</div>
      </div>

      <div class="field">
        <div class="label">PDF</div>
        <div id="pdfStatus" class="hint">Aucun PDF chargé</div>
      </div>

      <div class="field">
        <div class="label">Progression</div>
        <div id="progMsg" class="hint">Prêt.</div>
        <div class="progress"><div id="progBar"></div></div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <div class="label">Rechercher</div>
        <input id="searchInput" class="input" placeholder="BT, client, adresse, objet…" />
      </div>

      <div class="field">
        <div class="label">Docs</div>
        <div class="chips" id="typeChips"></div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <div class="label">Technicien</div>
        <select id="techSelect" class="select">
          <option value="">— Tous —</option>
        </select>
      </div>

      <div class="hint" id="sidebarHint">Importe un PDF puis clique sur <b>Extraire</b>.</div>
    </aside>

    <section class="content">
      <!-- Référent -->
      <section id="viewReferent" class="view view--active">
        <div class="pageHead">
          <div>
            <h1 class="h1">Bons de Travail</h1>
            <div id="planningLabel" class="sub">Planification : —</div>
          </div>
          <div class="pageHead__right">
            <div class="viewToggle">
              <button class="viewBtn viewBtn--active" data-rview="cards">Cartes</button>
              <button class="viewBtn" data-rview="planning">Planning</button>
            </div>
            <div class="kpis" id="kpis"></div>
          </div>
        </div>

        <div id="btGrid" class="grid"></div>

        <div id="planningView" class="planning" hidden>
          <div class="planning__header" id="planningHeader"></div>
          <div class="planning__body" id="planningBody"></div>
        </div>
      </section>

      <!-- Brief -->
      <section id="viewBrief" class="view">
        <div class="pageHead">
          <div>
            <h1 class="h1">Brief équipe</h1>
            <div id="briefLabel" class="sub">Sélectionne un technicien pour afficher ses BT.</div>
          </div>
          <div class="pageHead__right">
            <div class="viewToggle">
              <button class="viewBtn viewBtn--active" data-bview="cards">Cartes</button>
              <button class="viewBtn" data-bview="timeline">Timeline</button>
            </div>
            <div class="briefMeta" id="briefMeta"></div>
          </div>
        </div>

        <div id="briefList" class="briefList"></div>

        <div id="briefTimeline" class="planning planning--single" hidden>
          <div class="planning__header" id="briefPlanningHeader"></div>
          <div class="planning__body" id="briefPlanningBody"></div>
        </div>
      </section>

      <!-- Viewer modal -->
      <div id="modal" class="modal" aria-hidden="true">
        <div class="modal__backdrop" data-close="1"></div>
        <div class="modal__panel" role="dialog" aria-modal="true">
          <div class="modal__top">
            <div>
              <div id="modalTitle" class="modal__title">—</div>
              <div id="modalSub" class="modal__sub">—</div>
            </div>
            <button class="iconBtn" data-close="1" title="Fermer">✕</button>
          </div>

          <div class="modal__body">
            <canvas id="pdfCanvas"></canvas>
          </div>

          <div class="modal__bottom">
            <div class="pill" id="modalPill">—</div>
            <div class="modal__actions">
              <button id="btnPrevPage" class="btn btn--secondary">◀ Page</button>
              <button id="btnNextPage" class="btn btn--secondary">Page ▶</button>
              <button id="btnExportBt" class="btn">Exporter BT</button>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="./technicians.js"></script>
  <script src="./app.js"></script>
</body>
</html>
