<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRDF BDSN - Gestion des Bons de Travail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <img src="https://raw.githubusercontent.com/rachidben91-web/Lecteur-plan-terrain/main/assets/logo-grdf-bdsn1.png" alt="GRDF">
                </div>
                <div class="logo-text">
                    <span class="logo-title">Gestion des BT</span>
                    <span class="logo-subtitle">AI BOUCLE DE SEINE NORD</span>
                </div>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link active">Dashboard</a>
                <a href="briefing.html" class="nav-link">Briefing 📺</a>
            </nav>
        </div>
        <div class="header-center">
            <div class="date-display" id="dateDisplay">Lundi 19 Janvier 2026</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                <span>Temps réel</span>
            </div>
        </div>
        <div class="header-right">
            <div class="clock" id="clock">07:30</div>
            <div class="user-info">
                <div class="user-avatar">MK</div>
                <span style="font-size: 13px;">KHALI Mounir</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Tableau de bord</div>
                <div class="stats-grid">
                    <div class="stat-card" onclick="applyFilter('status', 'all')">
                        <div class="stat-value blue" id="statTotal">0</div>
                        <div class="stat-label">BT du jour</div>
                    </div>
                    <div class="stat-card" onclick="applyFilter('status', 'pending')">
                        <div class="stat-value orange" id="statPending">0</div>
                        <div class="stat-label">En attente</div>
                    </div>
                    <div class="stat-card" onclick="applyFilter('status', 'inprogress')">
                        <div class="stat-value blue" id="statInProgress">0</div>
                        <div class="stat-label">En cours</div>
                    </div>
                    <div class="stat-card" onclick="applyFilter('status', 'completed')">
                        <div class="stat-value green" id="statCompleted">0</div>
                        <div class="stat-label">Terminés</div>
                    </div>
                    <div class="stat-card" style="grid-column: span 2;">
                        <div class="stat-value green" id="statActiveTechs">0</div>
                        <div class="stat-label">Techniciens actifs</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Filtres</div>
                <select class="filter-select" id="filterType" onchange="applyFilters()">
                    <option value="all">Tous les types</option>
                    <option value="mhs">MHS - Mise Hors Service</option>
                    <option value="mes">MES - Mise En Service</option>
                    <option value="maintenance">Maintenance CI-CM</option>
                    <option value="adf">ADF - Fuite</option>
                    <option value="formation">Formation</option>
                    <option value="administratif">Administratif</option>
                </select>
                <select class="filter-select" id="filterSite" onchange="applyFilters()">
                    <option value="all">Tous les sites</option>
                    <option value="VLG">Villeneuve-la-Garenne</option>
                    <option value="SAR">Sartrouville</option>
                </select>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Équipes</div>
                <div class="tech-list" id="managersList"></div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Bons de Travail</h1>
                    <p class="page-subtitle" id="pageSubtitle">Planification du 19/01/2026</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-secondary" onclick="exportPDF()">📥 Export PDF</button>
                    <button class="btn btn-primary" onclick="openNewBT()">➕ Nouveau BT</button>
                </div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher par n° BT, adresse, technicien..." oninput="applyFilters()">
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" onclick="setView('grid')">Cartes</button>
                    <button class="view-btn" data-view="timeline" onclick="setView('timeline')">Planning</button>
                </div>
            </div>

            <div class="bt-grid bt-grid-view active" id="btGrid"></div>
            
            <div class="timeline-view" id="timelineView">
                <div class="timeline-container">
                    <div class="timeline-header" id="timelineHeader"></div>
                    <div class="timeline-body" id="timelineBody"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-bt-number" id="modalBtNumber"></div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <div style="display: flex; gap: 8px;">
                    <select class="status-select" id="modalStatusSelect" onchange="updateStatus()">
                        <option value="pending">En attente</option>
                        <option value="inprogress">En cours</option>
                        <option value="completed">Terminé</option>
                    </select>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary">📝 Modifier</button>
                    <button class="btn btn-primary">📤 Envoyer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
